<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842">
  <!-- A4 page background -->
  <rect width="595" height="842" fill="#F8F6F0"/>

  <!-- Header bar -->
  <rect width="595" height="72" fill="#1A1A2E"/>
  <text x="28" y="32" font-family="serif" font-size="11" font-weight="700" fill="#D4A574" letter-spacing="2">REVISE IT</text>
  <text x="28" y="52" font-family="sans-serif" font-size="13" fill="#ffffff">Question Specification Library v2.0</text>
  <text x="567" y="52" font-family="sans-serif" font-size="11" fill="#A7BEAE" text-anchor="end">Grade 11 Physical Sciences — CAPS</text>

  <!-- Section: Mechanics -->
  <rect x="28" y="96" width="539" height="28" fill="#5B8A72" rx="3"/>
  <text x="40" y="114" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">MECHANICS</text>

  <!-- Spec row 1 -->
  <rect x="28" y="132" width="539" height="64" fill="#ffffff" rx="2"/>
  <rect x="28" y="132" width="4" height="64" fill="#5B8A72"/>
  <text x="42" y="150" font-family="sans-serif" font-size="10" font-weight="700" fill="#5B8A72">P1-MECH-01</text>
  <text x="120" y="150" font-family="sans-serif" font-size="10" fill="#2D2D2D">Equilibrium &amp; Suspended Objects</text>
  <text x="42" y="168" font-family="sans-serif" font-size="9" fill="#4A4A4A">Newton's First Law applied to systems in static equilibrium — concurrent forces, resolve into components,</text>
  <text x="42" y="182" font-family="sans-serif" font-size="9" fill="#4A4A4A">calculate unknown tensions and angles. Marks: 12–18. Bloom's: Apply / Analyse.</text>

  <!-- Spec row 2 -->
  <rect x="28" y="204" width="539" height="64" fill="#F8F6F0" rx="2"/>
  <rect x="28" y="204" width="4" height="64" fill="#5B8A72"/>
  <text x="42" y="222" font-family="sans-serif" font-size="10" font-weight="700" fill="#5B8A72">P1-MECH-02</text>
  <text x="120" y="222" font-family="sans-serif" font-size="10" fill="#2D2D2D">Connected Bodies — Inclined Plane</text>
  <text x="42" y="240" font-family="sans-serif" font-size="9" fill="#4A4A4A">Newton's Second Law for a system on an inclined plane connected via a string over a pulley.</text>
  <text x="42" y="254" font-family="sans-serif" font-size="9" fill="#4A4A4A">Friction variant available. Marks: 14–20. Bloom's: Apply / Analyse.</text>

  <!-- Spec row 3 -->
  <rect x="28" y="276" width="539" height="64" fill="#ffffff" rx="2"/>
  <rect x="28" y="276" width="4" height="64" fill="#5B8A72"/>
  <text x="42" y="294" font-family="sans-serif" font-size="10" font-weight="700" fill="#5B8A72">P1-MECH-03</text>
  <text x="120" y="294" font-family="sans-serif" font-size="10" fill="#2D2D2D">Work, Energy &amp; Motion</text>
  <text x="42" y="312" font-family="sans-serif" font-size="9" fill="#4A4A4A">Work-energy theorem applied to real scenarios with friction, height changes, and velocity calculations.</text>
  <text x="42" y="326" font-family="sans-serif" font-size="9" fill="#4A4A4A">Marks: 10–16. Bloom's: Apply / Evaluate.</text>

  <!-- Section: Waves & Electromagnetism -->
  <rect x="28" y="358" width="539" height="28" fill="#1A1A2E" rx="3"/>
  <text x="40" y="376" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">WAVES &amp; ELECTROMAGNETIC INDUCTION</text>

  <!-- Spec row 4 -->
  <rect x="28" y="394" width="539" height="64" fill="#ffffff" rx="2"/>
  <rect x="28" y="394" width="4" height="64" fill="#1A1A2E"/>
  <text x="42" y="412" font-family="sans-serif" font-size="10" font-weight="700" fill="#1A1A2E">P1-WAVE-01</text>
  <text x="120" y="412" font-family="sans-serif" font-size="10" fill="#2D2D2D">Electromagnetic Induction</text>
  <text x="42" y="430" font-family="sans-serif" font-size="9" fill="#4A4A4A">Faraday's Law, Lenz's Law, induced EMF calculations. AC vs DC generator comparisons.</text>
  <text x="42" y="444" font-family="sans-serif" font-size="9" fill="#4A4A4A">Marks: 10–16. Bloom's: Remember / Understand / Apply.</text>

  <!-- Section: Chemistry -->
  <rect x="28" y="476" width="539" height="28" fill="#B85042" rx="3"/>
  <text x="40" y="494" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1.5">CHEMISTRY — ENERGY &amp; REACTIONS</text>

  <!-- Spec row 5 -->
  <rect x="28" y="512" width="539" height="64" fill="#ffffff" rx="2"/>
  <rect x="28" y="512" width="4" height="64" fill="#B85042"/>
  <text x="42" y="530" font-family="sans-serif" font-size="10" font-weight="700" fill="#B85042">P2-CHEM-01</text>
  <text x="120" y="530" font-family="sans-serif" font-size="10" fill="#2D2D2D">Thermochemistry</text>
  <text x="42" y="548" font-family="sans-serif" font-size="9" fill="#4A4A4A">Enthalpy changes, Hess's Law, bond energy calculations, endothermic vs exothermic graphing.</text>
  <text x="42" y="562" font-family="sans-serif" font-size="9" fill="#4A4A4A">Marks: 12–20. Bloom's: Apply / Analyse / Evaluate.</text>

  <!-- Spec row 6 -->
  <rect x="28" y="584" width="539" height="64" fill="#F8F6F0" rx="2"/>
  <rect x="28" y="584" width="4" height="64" fill="#B85042"/>
  <text x="42" y="602" font-family="sans-serif" font-size="10" font-weight="700" fill="#B85042">P2-CHEM-02</text>
  <text x="120" y="602" font-family="sans-serif" font-size="10" fill="#2D2D2D">Acid-Base Reactions</text>
  <text x="42" y="620" font-family="sans-serif" font-size="9" fill="#4A4A4A">Brønsted-Lowry conjugate pairs, neutralisation, buffer explanations, pH conceptual questions.</text>
  <text x="42" y="634" font-family="sans-serif" font-size="9" fill="#4A4A4A">Marks: 8–14. Bloom's: Remember / Understand / Apply.</text>

  <!-- Footer -->
  <rect x="0" y="810" width="595" height="32" fill="#F0EDE6"/>
  <text x="28" y="830" font-family="sans-serif" font-size="9" fill="#8A8A8A">Grade 11 Physical Sciences — CAPS Aligned</text>
